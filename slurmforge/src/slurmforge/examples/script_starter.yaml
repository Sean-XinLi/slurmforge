# ═══════════════════════════════════════════════════════════════════
# slurmforge · script mode · starter profile
# Generated by: sforge init script
#
# Quick-start checklist — fill in the 4 fields marked ~ below,
# then run:
#   sforge validate --config experiment.yaml
#   sforge generate --config experiment.yaml
# ═══════════════════════════════════════════════════════════════════

project: "my_project"
experiment_name: "experiment_v1"

# ───────────────────────────────────────────────────────────────────
# STEP 1 · REQUIRED  (replace every ~ before running)
# ───────────────────────────────────────────────────────────────────

cluster:
  partition: ~          # required · GPU partition name
                        #   find yours: sinfo -o '%P %G' | grep -i gpu
  account: ~            # required · cluster account / project name
                        #   find yours: sacctmgr show user $(whoami) format=user,account
  time_limit: ~         # required · max wall-clock time, e.g. "02:00:00" or "1-12:00:00"
  # ── commonly adjusted ───────────────────────────────────────────
  nodes: 1
  gpus_per_node: 1      # number of GPUs per node
  cpus_per_task: 4
  mem: "32G"

model:
  name: "my_model"
  script: ~             # required · path to your training script, e.g. "src/train.py"

# ───────────────────────────────────────────────────────────────────
# STEP 2 · CONFIGURE  (sensible defaults — adjust as needed)
# ───────────────────────────────────────────────────────────────────

run:
  args:
    max_length: 128     # adjust to your model's max sequence length
    epochsize: 1000     # number of training steps per epoch
    lr: 1e-4            # learning rate
    batch_size: 32      # batch size per GPU

env:
  venv_activate: ""     # recommended · e.g. "source /path/to/venv/bin/activate"
  conda_activate: ""    # alternative  · e.g. "my_conda_env"
  modules: []           # Lmod modules to load, e.g. ["cuda/12.1", "gcc/11.3"]

output:
  base_output_dir: "./runs"

# ───────────────────────────────────────────────────────────────────
# STEP 3 · ADVANCED  (leave as-is for your first run)
# ───────────────────────────────────────────────────────────────────

launcher:
  mode: "auto"          # auto / ddp / single

artifacts:
  checkpoint_globs: []  # e.g. ["checkpoints/**/*.pt"]
  extra_globs: []
