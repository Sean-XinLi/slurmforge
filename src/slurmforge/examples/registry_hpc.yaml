# ═══════════════════════════════════════════════════════════════════
# slurmforge · registry mode · hpc profile
# Generated by: sforge init registry --profile hpc
#
# Full HPC template using a shared model registry with sweep and eval.
# ═══════════════════════════════════════════════════════════════════

project: "my_project"
experiment_name: "experiment_v1"

output:
  base_output_dir: "./runs"
  batch_name: "auto"

# ───────────────────────────────────────────────────────────────────
# STEP 1 · REQUIRED  (replace every ~ before running)
# ───────────────────────────────────────────────────────────────────

cluster:
  partition: ~          # required · GPU partition name
  account: ~            # required · cluster account / project name
  time_limit: ~         # required · max wall-clock time, e.g. "08:00:00"
  # ── commonly adjusted ───────────────────────────────────────────
  nodes: 1
  gpus_per_node: 4
  cpus_per_task: 8
  mem: "64G"
  constraint: ""
  extra_sbatch_args: []

model:
  name: "my_model"      # must match a model name in your registry
  ddp_supported: true

model_registry:
  registry_file: ~      # required · path to your models.yaml

# ───────────────────────────────────────────────────────────────────
# STEP 2 · CONFIGURE
# ───────────────────────────────────────────────────────────────────

run:
  args: {}              # training hyperparameters

env:
  venv_activate: ""
  conda_activate: ""
  modules: []
  extra_env:
    TOKENIZERS_PARALLELISM: "false"

launcher:
  mode: "auto"
  distributed:
    nnodes: 1
    nproc_per_node: 4
    master_port: 29500
    port_offset: "auto"

eval:
  enabled: false
  script: "eval.py"
  workdir: "."
  launch_mode: "single"   # single / ddp / auto / inherit
  args: {}
  train_outputs:
    checkpoint_policy: "latest"

sweep:
  enabled: false
  shared_axes: {}

# ───────────────────────────────────────────────────────────────────
# STEP 3 · ADVANCED
# ───────────────────────────────────────────────────────────────────

artifacts:
  checkpoint_globs:
    - "checkpoints/**/*.pt"
  eval_csv_globs:
    - "eval_csv/**/*.csv"
  eval_image_globs: []
  extra_globs: []

validation:
  cli_args: "warn"
