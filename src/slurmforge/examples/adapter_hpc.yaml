# ═══════════════════════════════════════════════════════════════════
# slurmforge · adapter mode · hpc profile
# Generated by: sforge init adapter --profile hpc
#
# Full HPC adapter template with sweep and artifact sync.
# ═══════════════════════════════════════════════════════════════════

project: "my_project"
experiment_name: "experiment_v1"

output:
  base_output_dir: "./runs"
  batch_name: "auto"

# ───────────────────────────────────────────────────────────────────
# STEP 1 · REQUIRED  (replace every ~ before running)
# ───────────────────────────────────────────────────────────────────

cluster:
  partition: ~          # required · GPU partition name
  account: ~            # required · cluster account / project name
  time_limit: ~         # required · max wall-clock time, e.g. "08:00:00"
  nodes: 1
  gpus_per_node: 4
  cpus_per_task: 8
  mem: "64G"
  constraint: ""
  extra_sbatch_args: []

run:
  adapter:
    script: ~           # required · path to your adapter bridge script
    pass_run_args: true
    pass_model_overrides: true
    ddp_supported: false
    ddp_required: false
  args: {}              # key-value pairs passed as --run_args_json to the adapter

# ───────────────────────────────────────────────────────────────────
# STEP 2 · CONFIGURE
# ───────────────────────────────────────────────────────────────────

env:
  venv_activate: ""
  conda_activate: ""
  modules: []
  extra_env:
    TOKENIZERS_PARALLELISM: "false"

launcher:
  mode: "auto"

sweep:
  enabled: false
  shared_axes: {}

# ───────────────────────────────────────────────────────────────────
# STEP 3 · ADVANCED
# ───────────────────────────────────────────────────────────────────

artifacts:
  checkpoint_globs:
    - "checkpoints/**/*.pt"
  extra_globs: []

validation:
  cli_args: "warn"
