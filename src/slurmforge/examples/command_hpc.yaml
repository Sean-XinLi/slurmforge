# ═══════════════════════════════════════════════════════════════════
# slurmforge · command mode · hpc profile
# Generated by: sforge init command --profile hpc
#
# Full HPC template for command mode with sweep and artifact sync.
# ═══════════════════════════════════════════════════════════════════

project: "my_project"
experiment_name: "experiment_v1"

output:
  base_output_dir: "./runs"
  batch_name: "auto"

storage:
  backend:
    engine: "none"      # "none" = filesystem only; change to "sqlite" to enable SQLite metadata storage
    sqlite:
      path: "auto"      # sqlite mode only; "auto" = <batch_root>/meta/slurmforge.sqlite3
  exports:
    planning_recovery: true  # sqlite mode only; keep planning export files for recovery/debugging

# ───────────────────────────────────────────────────────────────────
# STEP 1 · REQUIRED  (replace every ~ before running)
# ───────────────────────────────────────────────────────────────────

cluster:
  partition: ~          # required · GPU partition name
  account: ~            # required · cluster account / project name
  time_limit: ~         # required · max wall-clock time, e.g. "08:00:00"
  # ── commonly adjusted ───────────────────────────────────────────
  nodes: 1
  gpus_per_node: 4
  cpus_per_task: 8
  mem: "64G"
  constraint: ""
  extra_sbatch_args: []

run:
  command: ~            # required · the exact shell command to run
  command_mode: "argv"  # argv or shell

# ───────────────────────────────────────────────────────────────────
# STEP 2 · CONFIGURE
# ───────────────────────────────────────────────────────────────────

env:
  venv_activate: ""
  conda_activate: ""
  modules: []
  extra_env:
    TOKENIZERS_PARALLELISM: "false"

# Sweep: each combination of listed values becomes one independent Slurm task
sweep:
  enabled: false
  shared_axes: {}       # e.g.:
                        #   lr: [1e-4, 5e-5]
                        #   batch_size: [64, 128]

# ───────────────────────────────────────────────────────────────────
# STEP 3 · ADVANCED
# ───────────────────────────────────────────────────────────────────

artifacts:
  checkpoint_globs:
    - "checkpoints/**/*.pt"
  extra_globs: []

validation:
  cli_args: "warn"

# Optional · how concurrent array groups share resources.max_available_gpus.
#   error       · fail validate/generate if groups together exceed the budget (default; safest)
#   serial      · auto-chain array groups with Slurm dependency when over budget
#   best_effort · per-group throttle only; no global guarantee — emits a warning
dispatch:
  group_overflow_policy: "error"
