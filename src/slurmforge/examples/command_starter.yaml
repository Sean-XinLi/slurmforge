# ═══════════════════════════════════════════════════════════════════
# slurmforge · command mode · starter profile
# Generated by: sforge init command
#
# Use this when you already have a complete launch command and want
# slurmforge to handle Slurm submission, logging, and retry.
#
# Fill in the 4 fields marked ~ then run:
#   sforge validate --config experiment.yaml
#   sforge generate --config experiment.yaml
# ═══════════════════════════════════════════════════════════════════

project: "my_project"
experiment_name: "experiment_v1"

# ───────────────────────────────────────────────────────────────────
# STEP 1 · REQUIRED  (replace every ~ before running)
# ───────────────────────────────────────────────────────────────────

cluster:
  partition: ~          # required · GPU partition name
                        #   find yours: sinfo -o '%P %G' | grep -i gpu
  account: ~            # required · cluster account / project name
                        #   find yours: sacctmgr show user $(whoami) format=user,account
  time_limit: ~         # required · max wall-clock time, e.g. "02:00:00"
  # ── commonly adjusted ───────────────────────────────────────────
  nodes: 1
  gpus_per_node: 1
  cpus_per_task: 4
  mem: "32G"

run:
  command: ~            # required · the exact shell command to run, e.g.:
                        #   "python train.py --epochs 1"
                        #   "torchrun --nproc_per_node 4 train.py --batch_size 128"
  command_mode: "argv"  # argv (default) or shell (enables $VAR, pipes, etc.)

# ───────────────────────────────────────────────────────────────────
# STEP 2 · CONFIGURE  (sensible defaults — adjust as needed)
# ───────────────────────────────────────────────────────────────────

env:
  venv_activate: ""     # recommended · e.g. "source /path/to/venv/bin/activate"
  conda_activate: ""
  modules: []

output:
  base_output_dir: "./runs"

storage:
  backend:
    engine: "none"      # "none" = filesystem only; change to "sqlite" to enable SQLite metadata storage
    sqlite:
      path: "auto"      # sqlite mode only; "auto" = <batch_root>/meta/slurmforge.sqlite3
  exports:
    planning_recovery: true  # sqlite mode only; keep planning export files for recovery/debugging

# ───────────────────────────────────────────────────────────────────
# STEP 3 · ADVANCED  (leave as-is for your first run)
# ───────────────────────────────────────────────────────────────────

artifacts:
  checkpoint_globs: []  # e.g. ["checkpoints/**/*.pt"]
  extra_globs: []

# Optional · how concurrent array groups share resources.max_available_gpus.
#   error       · fail validate/generate if groups together exceed the budget (default; safest)
#   serial      · auto-chain array groups with Slurm dependency when over budget
#   best_effort · per-group throttle only; no global guarantee — emits a warning
dispatch:
  group_overflow_policy: "error"
