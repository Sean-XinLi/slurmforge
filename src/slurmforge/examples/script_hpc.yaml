# ═══════════════════════════════════════════════════════════════════
# slurmforge · script mode · hpc profile
# Generated by: sforge init script --profile hpc
#
# Full HPC template with multi-GPU, eval, sweep, and artifact sync.
# Fill in every ~ field before running.
# ═══════════════════════════════════════════════════════════════════

project: "my_project"
experiment_name: "experiment_v1"

output:
  base_output_dir: "./runs"
  batch_name: "auto"    # set a fixed name to avoid timestamp suffixes

storage:
  backend:
    engine: "none"      # "none" = filesystem only; change to "sqlite" to enable SQLite metadata storage
    sqlite:
      path: "auto"      # sqlite mode only; "auto" = <batch_root>/meta/slurmforge.sqlite3
  exports:
    planning_recovery: true  # sqlite mode only; keep planning export files for recovery/debugging

# ───────────────────────────────────────────────────────────────────
# STEP 1 · REQUIRED  (replace every ~ before running)
# ───────────────────────────────────────────────────────────────────

cluster:
  partition: ~          # required · GPU partition name
                        #   find yours: sinfo -o '%P %G' | grep -i gpu
  account: ~            # required · cluster account / project name
                        #   find yours: sacctmgr show user $(whoami) format=user,account
  time_limit: ~         # required · max wall-clock time, e.g. "08:00:00" or "2-00:00:00"
  # ── commonly adjusted ───────────────────────────────────────────
  nodes: 1
  gpus_per_node: 4      # GPUs per node
  cpus_per_task: 8
  mem: "64G"
  constraint: ""        # optional node constraint, e.g. "a100|h100"
  extra_sbatch_args: [] # additional raw #SBATCH directives

model:
  name: "my_model"
  script: ~             # required · path to your training script, e.g. "src/train.py"
  ddp_supported: true   # set to false if your script does not support multi-GPU DDP

# ───────────────────────────────────────────────────────────────────
# STEP 2 · CONFIGURE  (adjust to match your cluster and training setup)
# ───────────────────────────────────────────────────────────────────

run:
  args: {}              # your training hyperparameters, e.g.:
                        #   lr: 1e-4
                        #   epochs: 50
                        #   batch_size: 128
                        #   data_dir: "/path/to/data"

env:
  venv_activate: ""     # recommended · e.g. "source /path/to/shared/venv/bin/activate"
  conda_activate: ""    # alternative  · e.g. "my_conda_env"
  modules: []           # e.g. ["cuda/12.1", "nccl/2.18"]
  extra_env:
    TOKENIZERS_PARALLELISM: "false"
    NCCL_DEBUG: "WARN"

launcher:
  mode: "auto"          # auto selects ddp when ddp_supported=true and gpus_per_node > 1
  python_bin: "python"
  distributed:
    nnodes: 1           # must match cluster.nodes
    nproc_per_node: 4   # must match cluster.gpus_per_node
    master_port: 29500
    port_offset: "auto"

# ───────────────────────────────────────────────────────────────────
# Evaluation (runs inline in the same Slurm job after training)
# ───────────────────────────────────────────────────────────────────

eval:
  enabled: false        # set to true to run eval after every training run
  script: "eval.py"
  workdir: "."
  launch_mode: "single"   # single / ddp / auto / inherit
  args: {}              # e.g.: {test_split: 0.1, metrics: "accuracy,f1"}
  train_outputs:
    checkpoint_policy: "latest"   # latest / best / explicit

# ───────────────────────────────────────────────────────────────────
# Hyperparameter sweep (matrix product of all listed values)
# ───────────────────────────────────────────────────────────────────

sweep:
  enabled: false        # set to true to run a grid sweep
  shared_axes: {}       # e.g.:
                        #   lr: [1e-4, 5e-5, 1e-5]
                        #   batch_size: [64, 128]

# ───────────────────────────────────────────────────────────────────
# STEP 3 · ADVANCED  (artifact collection, validation overrides)
# ───────────────────────────────────────────────────────────────────

artifacts:
  checkpoint_globs:
    - "checkpoints/**/*.pt"
    - "checkpoints/**/*.ckpt"
  eval_csv_globs:
    - "eval_csv/**/*.csv"
  eval_image_globs: []
  extra_globs: []

validation:
  cli_args: "warn"      # warn / error / ignore
